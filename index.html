<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>RAFAEL PALAFOX // PRINCIPAL ENGINEER</title>
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="css/main.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="font-body-base antialiased selection:bg-primary-container selection:text-on-primary-container">
    
    <!-- Header Module -->
    <div id="header"></div>
    
    <main class="pt-24 min-h-screen">
        <!-- Hero Module -->
        <div id="hero"></div>
        
        <!-- Services Module -->
        <div id="services"></div>
        
        <!-- Tech & Experience Module -->
        <div id="tech-experience"></div>
        
        <!-- Portfolio Module -->
        <div id="portfolio"></div>
        
        <!-- CTA Module -->
        <div id="cta"></div>
    </main>
    
    <!-- Footer Module -->
    <div id="footer"></div>
    
    <!-- Mobile Drawer Module -->
    <div id="mobile-drawer"></div>
    
    <!-- JavaScript -->
    <script src="js/main.js"></script>
    
    <script>
        // Cargar todos los módulos HTML
        async function loadModule(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading ${filePath}:`, error);
            }
        }
        
        // Cargar todas las secciones
        Promise.all([
            loadModule('header', 'sections/header.html'),
            loadModule('hero', 'sections/hero.html'),
            loadModule('services', 'sections/services.html'),
            loadModule('tech-experience', 'sections/tech-experience.html'),
            loadModule('portfolio', 'sections/portfolio.html'),
            loadModule('cta', 'sections/cta.html'),
            loadModule('footer', 'sections/footer.html'),
            loadModule('mobile-drawer', 'sections/mobile-drawer.html')
        ]).then(() => {
            // Inicializar funcionalidades después de cargar los módulos
            if (window.initializeModules) window.initializeModules();
        });
    </script>
</body>
</html>
